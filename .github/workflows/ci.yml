name: GymRats CI Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Get my code
        uses: actions/checkout@v4

      - name: Step 2 - Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 3 - Confirm it worked
        run: echo "✅ GymRats pipeline is working!"

      - name: Step 4 - Show Node version
        run: node --version

      - name: Step 5 - Show greeting
        run: echo "My name is YOUR_NAME and GymRats is live!"

      - name: Step 6 - Running npm build
        run: npm run build

      - name: Step 7 - Show current branch
        run: echo "Current branch $GITHUB_REF"