name: GymRats CI Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Get my code
        uses: actions/checkout@v4

      - name: Step 2 - Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 3 - Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Step 4 - Build frontend
        run: npm run build
        working-directory: frontend

      - name: Step 5 - Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Step 6 - Build backend
        run: ./node_modules/.bin/nest build
        working-directory: backend